<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
    <header>
        <h1 class="head1">任务管理系统</h1>
        <div class="com1">
            <div class="search-container">
                <input type="text">
                <button>搜索</button>
            </div>
            <button class="head2">新建任务</button>
        </div>
    </header>

    <nav>
        <a href="#">Dashboard</a>
        <a href="#">My Task</a>
        <a href="#">Setting</a>
    </nav>
    <div class="combine">
        <div class="container">
            <div class="card">
                <div class="card1">
                    <h1>
                        今日待办
                    </h1>
                    <p>
                        15
                    </p>
                </div>
                <div class="card2">
                    <h1>
                        已完成任务
                    </h1>
                    <p>
                        10
                    </p>
                </div>
            </div>
            <h2>任务列表</h2>
            <hr size="3" color="bisque">
            <div class="list">
                <table>
                    <thead>
                        <tr>
                            <th>名称</th>
                            <th>截止日期</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>梳理框架</td>
                            <td>2026.4.31</td>
                            <td>已完成</td>
                        </tr>
                        <tr>
                            <td>对应学习</td>
                            <td>2026.4.31</td>
                            <td>进行中</td>
                        </tr>
                        <tr>
                            <td>编写代码</td>
                            <td>2026.4.31</td>
                            <td>进行中</td>
                        </tr>
                        <tr>
                            <td>完成笔记</td>
                            <td>2026.4.31</td>
                            <td>进行中</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="extra">
            <div class="extra1">
                <h1>
                    今日日程
                </h1>
                <ul>
                    <li>睡觉</li>
                    <li>吃饭</li>
                    <li>上课</li>
                    <li>学习</li>
                </ul>
            </div>
            <div class="extra2">
                <h1>
                    近日活动
                </h1>
                <ul>
                    <li>写作业</li>
                    <li>编代码</li>
                    <li>吃零食</li>
                </ul>
            </div>
            <div class="extra3">
                <h1>
                    团队成员
                </h1>
                <ul>
                    <li>小黑子</li>
                    <li>忧郁奶龙</li>
                    <li>凑企鹅</li>
                </ul>
            </div>
            <div class="extra4">
                <h1>
                     温馨提示
                </h1>
                <ul>
                    <li>请在截止日期前完成任务</li>
                    <li>不要半途而废</li>
                    <li>不要被别人打乱节奏</li>
                </ul>
            </div>
        </div>
    </div>

</body>
</html>
